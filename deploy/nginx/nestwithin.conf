# nginx vhost for The Nest web demo at nestwithin.mrrado.com.
#
# The app is a fully static, self-contained Flutter web bundle — no backend,
# no API key, no proxy. certbot --nginx rewrites this in place to add the :443
# server block and the HTTP->HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name nestwithin.mrrado.com;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ { root /var/www/html; }

    root /var/www/nestwithin;
    index index.html;

    # The Nest API (Node service on 127.0.0.1:8091) — same-origin, so the web
    # app talks to /api with no CORS and reuses this vhost's TLS cert.
    location /api/ {
        proxy_pass http://127.0.0.1:8091;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Flutter web is a single-page app: route everything else to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the fingerprinted assets; never cache the entry points.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|woff2?|ttf|otf|json|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
    location = /index.html { add_header Cache-Control "no-cache"; }
    location = /flutter_service_worker.js { add_header Cache-Control "no-cache"; }
}
